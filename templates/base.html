{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Clínica Vida{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Estilos Globais -->
    <link rel="stylesheet" href="{% static 'assets/css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/loader.css' %}">
    {% block extra_css %}{% endblock %}

    {% include "partials/fontes.html" %}
</head>

<body>

    <!-- Loader Global -->
    <div id="loader" class="loading">
        <div class="spinner-border text-success" role="status" style="width: 4rem; height: 4rem;">
            <span class="visually-hidden">Carregando...</span>
        </div>
    </div>

    <!-- Layout Container (Sidebar + Resumo do Corpo) -->
    <div class="app-layout">

        <!-- Sidebar Customizada -->
        {% include "partials/sidebar.html" %}

        <!-- Conteúdo Principal -->
        <div class="main-content" id="main-content">

            <!-- Navbar Superior -->
            {% include "partials/navbar_base.html" %}

            <!-- Corpo da Página -->
            <div class="container-fluid p-4 page-content">
                {% block content %}
                {% endblock %}
            </div>

            <!-- Footer Global -->
            <!-- {% include "partials/footer.html" %} -->

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous">
        </script>

    <!-- Script de Interações Customizado -->
    <script src="{% static 'js/sidebar.js' %}"></script>
    <script src="{% static 'js/loader.js' %}"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
