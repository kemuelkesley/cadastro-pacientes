{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar_cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.10/jquery.mask.js"></script>

    

    {% include "partials/fontes.html" %}   

    <!--CSS-->
    <link rel="stylesheet" href="{% static 'assets/css/tabela.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/inputs.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/formulario.css' %}">

  
</head>
<body>     
    
    {% include "partials/navbar.html" %}

    <main class="container mt-5 contorno__form__geral">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body px-4 py-5">
                <h3 class="text-success text-center mb-4 fw-bold">
                    <i class="bi bi-person-plus-fill me-2"></i> Cadastrar Paciente
                </h3>

                <form method="POST">
                    {% csrf_token %}
                    {% load crispy_forms_tags %}
                    {{ form|crispy }}

                    <div class="d-flex justify-content-center mt-4">
                        <button type="submit" class="button__form">
                            <i class="bi bi-check-circle me-1"></i> Cadastrar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>



    <script src="{% static 'js/mascaras.js' %}"></script>
    <script src="{% static 'js/apiCEP.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
